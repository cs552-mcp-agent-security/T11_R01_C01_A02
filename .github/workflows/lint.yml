name: lint
on: [pull_request, push]
jobs:
  sqlfluff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlfluff==3.0.0
      - run: sqlfluff lint migrations/ --dialect postgres
