# pgdev local development PostgreSQL configuration.
# Tuned for low memory laptop usage, not for production.

listen_addresses = '*'
port = 5432
max_connections = 50

shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 32MB

log_destination = 'stderr'
logging_collector = off
log_statement = 'ddl'
log_min_duration_statement = 500ms

# scram-sha-256 hashing for password auth
password_encryption = scram-sha-256
